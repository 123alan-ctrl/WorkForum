{% extends "base.html" %}
{% block title %}分类管理{% endblock %}
{% block content %}
<div class="admin-layout">
  <div class="admin-sidebar">
    <div style="padding:16px 20px 8px;font-size:.75rem;color:var(--text-muted);font-weight:600;text-transform:uppercase;">管理菜单</div>
    <a href="{{ url_for('admin.dashboard') }}" class="admin-nav-item"><i class="fas fa-tachometer-alt"></i> 控制台</a>
    <a href="{{ url_for('admin.users') }}" class="admin-nav-item"><i class="fas fa-users"></i> 用户管理</a>
    <a href="{{ url_for('admin.posts') }}" class="admin-nav-item"><i class="fas fa-file-alt"></i> 帖子管理</a>
    <a href="{{ url_for('admin.categories') }}" class="admin-nav-item active"><i class="fas fa-tags"></i> 分类管理</a>
    <div style="border-top:1px solid var(--border);margin:12px 0;"></div>
    <a href="{{ url_for('main.index') }}" class="admin-nav-item"><i class="fas fa-arrow-left"></i> 返回前台</a>
  </div>
  <div class="admin-content" style="display:grid;grid-template-columns:1fr 360px;gap:20px;align-items:start;">
    <!-- 分类列表 -->
    <div class="card">
      <div class="card-header"><h3><i class="fas fa-tags"></i> 分类列表</h3></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>分类</th><th>描述</th><th>帖子数</th><th>操作</th></tr></thead>
          <tbody>
            {% for cat in categories %}
            <tr>
              <td>
                <div style="display:flex;align-items:center;gap:8px;">
                  <div style="width:32px;height:32px;border-radius:8px;background:{{ cat.color }}20;display:flex;align-items:center;justify-content:center;">
                    <i class="fas {{ cat.icon }}" style="color:{{ cat.color }};"></i>
                  </div>
                  <span style="font-weight:600;">{{ cat.name }}</span>
                </div>
              </td>
              <td style="font-size:.85rem;color:var(--text-muted);">{{ cat.description or '-' }}</td>
              <td>{{ cat.post_count }}</td>
              <td>
                <form method="POST" action="{{ url_for('admin.delete_category', cat_id=cat.id) }}"
                      onsubmit="return confirm('确认删除分类「{{ cat.name }}」？只有无帖子的分类可删除')">
                  <button class="btn btn-sm btn-danger"><i class="fas fa-trash"></i> 删除</button>
                </form>
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>

    <!-- 添加分类 -->
    <div class="card">
      <div class="card-header"><h3><i class="fas fa-plus"></i> 添加分类</h3></div>
      <div class="card-body">
        <form method="POST" action="{{ url_for('admin.add_category') }}">
          <div class="form-group">
            <label class="form-label">分类名称 <span style="color:var(--danger)">*</span></label>
            <input class="form-control" name="name" placeholder="如：技术交流" required>
          </div>
          <div class="form-group">
            <label class="form-label">描述</label>
            <input class="form-control" name="description" placeholder="简短描述">
          </div>
          <div class="form-group">
            <label class="form-label">Font Awesome 图标</label>
            <input class="form-control" name="icon" value="fa-folder" placeholder="如：fa-code">
            <small style="color:var(--text-muted);">访问 <a href="https://fontawesome.com/icons" target="_blank">fontawesome.com</a> 查找图标</small>
          </div>
          <div class="form-group">
            <label class="form-label">主题颜色</label>
            <div style="display:flex;gap:8px;align-items:center;">
              <input class="form-control" type="color" name="color" value="#4f46e5" style="width:60px;height:42px;padding:4px;">
              <span style="font-size:.85rem;color:var(--text-muted);">选择分类颜色</span>
            </div>
          </div>
          <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;">
            <i class="fas fa-plus"></i> 添加分类
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
