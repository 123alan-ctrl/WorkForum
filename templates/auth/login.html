{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title"><i class="fas fa-comments" style="color:var(--primary);"></i> WorkForum</div>
    <div class="auth-subtitle">欢迎回来，请登录你的账号</div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> 用户名</label>
        <input class="form-control" name="username" placeholder="请输入用户名" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> 密码</label>
        <input class="form-control" type="password" name="password" placeholder="请输入密码" required>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;padding:12px;">
        <i class="fas fa-sign-in-alt"></i> 登录
      </button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:.9rem;color:var(--text-muted);">
      还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a>
    </div>
    <div style="margin-top:20px;padding:14px;background:var(--bg);border-radius:8px;font-size:.82rem;color:var(--text-muted);">
      <strong>演示账号：</strong><br>
      管理员：admin / admin123<br>
      普通用户：张三 / 123456
    </div>
  </div>
</div>
{% endblock %}
