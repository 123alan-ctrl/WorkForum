{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-title">创建账号</div>
    <div class="auth-subtitle">加入 WorkForum，参与精彩讨论</div>
    <form method="POST">
      <div class="form-group">
        <label class="form-label"><i class="fas fa-user"></i> 用户名 <span style="color:var(--danger)">*</span></label>
        <input class="form-control" name="username" placeholder="2-50个字符" minlength="2" maxlength="50" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-envelope"></i> 邮箱 <span style="color:var(--danger)">*</span></label>
        <input class="form-control" type="email" name="email" placeholder="your@email.com" required>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> 密码 <span style="color:var(--danger)">*</span></label>
        <input class="form-control" type="password" name="password" placeholder="至少6位" minlength="6" required>
      </div>
      <div class="form-group">
        <label class="form-label"><i class="fas fa-lock"></i> 确认密码 <span style="color:var(--danger)">*</span></label>
        <input class="form-control" type="password" name="confirm" placeholder="再次输入密码" required>
      </div>
      <button class="btn btn-primary" type="submit" style="width:100%;justify-content:center;padding:12px;">
        <i class="fas fa-user-plus"></i> 注册
      </button>
    </form>
    <div style="text-align:center;margin-top:20px;font-size:.9rem;color:var(--text-muted);">
      已有账号？<a href="{{ url_for('auth.login') }}">立即登录</a>
    </div>
  </div>
</div>
{% endblock %}
